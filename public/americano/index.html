el:"Timed rounds or Score rounds",long:"Timed rounds run to a clock sized to fit between your start and finish times, with a buzzer for warm-up and changeovers. Score rounds have no clock and a round ends when its scores are in."},{id:"scoreunit",label:"Points or Games",long:"This sets the word used for scores in entry, standings, and the shared view. It changes nothing about how scores are counted or ranked."},{id:"bestof",label:"Best of",long:"Every match plays the full target. The two scores have to add up to it, so entering one side fills in the other automatically."},{id:"firstto",label:"First to",long:"The first side to reach the target wins and the other side keeps whatever it scored. You enter both scores, and exactly one of them must have reached the target."},{id:"target",label:"Points or games per match",long:"Tap one of the presets or type any number from 4 to 99. New events start at 25."},{id:"rotation",label:"Strict or Smart rotation",long:"Strict plays the full rotation and works out the number of rounds for you. Smart lets you set the number of rounds and arranges them to avoid repeat partners first, then repeat opponents. Mexicano formats draw from the standings instead, so they have no rotation setting."},{id:"courts",label:"Courts",long:"Set how many courts you have. If there are not enough players or teams to fill them, the setup tells you how many can actually run at once."},{id:"timing",label:"Start, finish, warm-up and changeover",long:"Round length is worked out from the time between start and finish, less the warm-up and the changeovers. These apply to timed rounds only."}]},{id:"running",title:"Running the event",entries:[{id:"build",label:"Build schedule",short:"Draw the schedule from your players and settings",long:"Draws the schedule and shows it for review. Nothing starts until you tap Start event."},{id:"regenerate",label:"Regenerate",short:"Draw a different schedule from the same settings",long:"Draws another schedule from the same players and settings, in case you want a different arrangement of the same event."},{id:"editsetup",label:"Edit setup",short:"Go back to settings and drop this draw",long:"Returns to the setup form. The schedule you are looking at is dropped, and you build a new one when you are ready."},{id:"startround",label:"Starting and ending a round",long:"A timed round waits for your tap before the clock runs. The clock does not end the round: it keeps counting into overtime until you confirm the scores, so a long match never cuts itself off."},{id:"addminute",label:"Add a minute",short:"Add a minute to the running timer",long:"Adds a minute to whichever timer is running, whether that is the warm-up, a changeover, or a round that needs a little longer."},{id:"confirm",label:"Confirm scores",long:"Records the round and moves on. In Score rounds every court has to be valid first. In Mexicano formats the next round is drawn once these scores are in, so it reflects the result you just entered."},{id:"standings",label:"Standings",short:"See the table and correct a past round",long:"Shows the ranking table at any point, and lets you tap a completed round to correct a score."},{id:"correctround",label:"Correcting a past round",short:"Fix a score you entered wrong",long:"Opens a completed round so you can change what you entered, and the standings recompute as soon as you save. In Mexicano formats a round that was already drawn stays as it was drawn, because those pairings were made from the older standings."},{id:"tiebreak",label:"How ties are broken",long:"Ranking is by total score first, then by score difference. Anyone level on both shares the same rank, and the next rank skips to account for it."}]},{id:"saving",title:"Saving and resuming",entries:[{id:"saving",label:"Nothing is lost on a reload",long:"Your setup, the running event, and even the scores you have part-typed for the current round are saved on this device after every action. A reload keeps the clock in the right place
